AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DeployCtrl - Self-service infrastructure provisioning platform.
  Deploys a single EC2 instance running Django (gunicorn), MongoDB, and Nginx.
  The instance type, disk size, and disk type are fully parameterizable.

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:

  # ── Compute ──────────────────────────────────────────────────────────────
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3a.small
      - t3a.medium
      - t3a.large
      - m5.large
      - m5.xlarge
    Description: >
      EC2 instance type. t3.small is sufficient for small teams (<20 users).
      Use t3.medium or larger for teams with heavy concurrent usage.

  DiskSizeGB:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 500
    ConstraintDescription: Must be between 20 and 500 GB.
    Description: Root EBS volume size in GB (includes OS, app, and MongoDB data).

  DiskType:
    Type: String
    Default: gp3
    AllowedValues: [gp3, gp2, io1]
    Description: EBS root volume type. gp3 is recommended (better performance, lower cost).

  # ── Access ────────────────────────────────────────────────────────────────
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access. Must already exist in the target region.

  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'
    ConstraintDescription: Must be a valid CIDR range (e.g. 203.0.113.10/32).
    Description: >
      IP CIDR allowed to SSH into the instance.
      Restrict to your IP (x.x.x.x/32) in production.

  # ── Source code ───────────────────────────────────────────────────────────
  CodeS3Bucket:
    Type: String
    Description: >
      S3 bucket name that holds the application tarball.
      Created automatically by deploy.sh before stack creation.

  CodeS3Key:
    Type: String
    Default: deployctrl.tar.gz
    Description: S3 object key of the application tarball (created by deploy.sh).

  # ── Application ───────────────────────────────────────────────────────────
  AppSecretKey:
    Type: String
    NoEcho: true
    MinLength: 20
    ConstraintDescription: Must be at least 20 characters.
    Description: >
      Django SECRET_KEY. Generated automatically by deploy.sh.
      To set manually: python3 -c "import secrets; print(secrets.token_urlsafe(50))"

  AllowedHosts:
    Type: String
    Default: '*'
    Description: >
      Comma-separated Django ALLOWED_HOSTS.
      After deployment, replace * with your Elastic IP or domain name.
      Example: 203.0.113.10,app.example.com

  CORSAllowedOrigins:
    Type: String
    Default: ''
    Description: >
      Comma-separated CORS allowed origins for the API.
      Example: https://app.example.com,http://localhost:5173
      Leave empty if not using a separate frontend.

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, production]
    Description: >
      Deployment environment.
      production sets DEBUG=False and enforces stricter security.

  # ── MongoDB ───────────────────────────────────────────────────────────────
  MongoDBVersion:
    Type: String
    Default: '8.0'
    AllowedValues: ['7.0', '8.0']
    Description: MongoDB version to install.

  # ── JWT ───────────────────────────────────────────────────────────────────
  JWTAccessHours:
    Type: Number
    Default: 8
    MinValue: 1
    MaxValue: 72
    Description: JWT access token lifetime in hours.

  JWTRefreshDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 30
    Description: JWT refresh token lifetime in days.


# ── Mappings ──────────────────────────────────────────────────────────────────
Mappings:

  EnvironmentConfig:
    development:
      Debug: 'True'
    production:
      Debug: 'False'


# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── IAM Role ─────────────────────────────────────────────────────────────
  # Grants SSM Session Manager (keyless shell access) and CloudWatch Logs.
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-app-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3CodeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${CodeS3Bucket}/${CodeS3Key}'
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppRole

  # ── Security Group ────────────────────────────────────────────────────────
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg'
      GroupDescription: DeployCtrl - HTTP, HTTPS, and restricted SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (nginx)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (future TLS termination)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'
        - Key: Stack
          Value: !Ref AWS::StackName

  # ── Elastic IP ────────────────────────────────────────────────────────────
  AppEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'
        - Key: Stack
          Value: !Ref AWS::StackName

  AppEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AppInstance
      EIP: !Ref AppEIP

  # ── EC2 Instance ──────────────────────────────────────────────────────────
  AppInstance:
    Type: AWS::EC2::Instance

    # CloudFormation waits up to 30 minutes for cfn-signal before marking
    # the stack CREATE_COMPLETE. If the script fails, the stack rolls back.
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M

    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref AppInstanceProfile
      SecurityGroups:
        - !Ref AppSecurityGroup

      # Latest Amazon Linux 2023 x86_64 — resolved at deploy time via SSM.
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'

      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref DiskSizeGB
            VolumeType: !Ref DiskType
            Encrypted: true
            DeleteOnTermination: true

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app'
        - Key: Stack
          Value: !Ref AWS::StackName
        - Key: Environment
          Value: !Ref Environment

      UserData:
        Fn::Base64:
          # Fn::Sub with a list lets us inject FindInMap results as named
          # variables alongside the standard ${Parameter} substitutions.
          Fn::Sub:
            - |
              #!/bin/bash -xe
              exec > >(tee /var/log/deployctrl-init.log | logger -t deployctrl-init -s 2>/dev/console) 2>&1

              # ── 1. cfn-signal helper (pre-installed on AL2023) ───────────
              export PATH=$PATH:/opt/aws/bin

              signal() {
                cfn-signal -e "$1" \
                  --stack  '${AWS::StackName}' \
                  --resource AppInstance \
                  --region '${AWS::Region}'
              }
              trap 'signal 1' ERR

              # ── 2. System packages ───────────────────────────────────────
              dnf install -y python3.11 nginx git unzip

              # ── 3. Terraform 1.10.5 ──────────────────────────────────────
              curl -fsSL https://releases.hashicorp.com/terraform/1.10.5/terraform_1.10.5_linux_amd64.zip \
                -o /tmp/terraform.zip
              unzip -q /tmp/terraform.zip -d /usr/local/bin/
              rm /tmp/terraform.zip

              # ── 4. MongoDB ${MongoDBVersion} ─────────────────────────────
              printf '[mongodb-org]\nname=MongoDB Repository\nbaseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/${MongoDBVersion}/x86_64/\ngpgcheck=1\nenabled=1\ngpgkey=https://pgp.mongodb.com/server-${MongoDBVersion}.asc\n' \
                > /etc/yum.repos.d/mongodb-org.repo

              dnf install -y mongodb-org
              systemctl enable --now mongod

              # Wait up to 30 s for MongoDB to accept connections
              for i in $(seq 1 15); do
                mongosh --eval "db.adminCommand('ping')" --quiet && break
                sleep 2
              done

              # ── 5. Dedicated system user ─────────────────────────────────
              useradd -r -s /sbin/nologin deployctrl

              # ── 6. Download application code from S3 ────────────────────
              mkdir -p /opt/deployctrl
              aws s3 cp s3://${CodeS3Bucket}/${CodeS3Key} /tmp/deployctrl.tar.gz
              tar -xzf /tmp/deployctrl.tar.gz -C /opt/deployctrl
              rm /tmp/deployctrl.tar.gz
              chown -R deployctrl:deployctrl /opt/deployctrl
              chmod -R g+rw /opt/deployctrl/tf_templates

              # ── 7. Python virtual environment & dependencies ─────────────
              python3.11 -m venv /opt/deployctrl/.venv
              /opt/deployctrl/.venv/bin/pip install --upgrade pip -q
              /opt/deployctrl/.venv/bin/pip install -r /opt/deployctrl/requirements.txt -q

              # ── 8. Environment file ──────────────────────────────────────
              printf 'SECRET_KEY=%s\nDEBUG=%s\nALLOWED_HOSTS=%s\nMONGO_URI=mongodb://localhost:27017/deployctrl\nMONGO_DB=deployctrl\nJWT_ACCESS_HOURS=%s\nJWT_REFRESH_DAYS=%s\nCORS_ALLOWED_ORIGINS=%s\n' \
                '${AppSecretKey}' '${DebugValue}' '${AllowedHosts}' \
                '${JWTAccessHours}' '${JWTRefreshDays}' '${CORSAllowedOrigins}' \
                > /opt/deployctrl/.env

              chmod 600 /opt/deployctrl/.env
              chown deployctrl:deployctrl /opt/deployctrl/.env

              # ── 9. Static files & demo seed data ─────────────────────────
              cd /opt/deployctrl
              sudo -u deployctrl /opt/deployctrl/.venv/bin/python manage.py \
                collectstatic --noinput -v 0
              sudo -u deployctrl /opt/deployctrl/.venv/bin/python manage.py \
                seed_data

              # ── 10. Gunicorn systemd service ─────────────────────────────
              mkdir -p /var/log/deployctrl
              chown deployctrl:deployctrl /var/log/deployctrl

              printf '%s\n' \
                '[Unit]' \
                'Description=DeployCtrl - Gunicorn application server' \
                'After=network.target mongod.service' \
                'Requires=mongod.service' \
                '' \
                '[Service]' \
                'Type=simple' \
                'User=deployctrl' \
                'Group=deployctrl' \
                'WorkingDirectory=/opt/deployctrl' \
                'EnvironmentFile=/opt/deployctrl/.env' \
                'ExecStart=/opt/deployctrl/.venv/bin/gunicorn deployctrl.wsgi:application --bind 127.0.0.1:8000 --workers 2 --timeout 60 --access-logfile /var/log/deployctrl/access.log --error-logfile /var/log/deployctrl/error.log' \
                'Restart=on-failure' \
                'RestartSec=5' \
                '' \
                '[Install]' \
                'WantedBy=multi-user.target' \
                > /etc/systemd/system/deployctrl.service

              systemctl daemon-reload
              systemctl enable --now deployctrl

              # ── 11. Nginx reverse proxy ──────────────────────────────────
              # Remove the default catch-all config
              rm -f /etc/nginx/conf.d/default.conf

              printf '%s\n' \
                'server {' \
                '    listen 80 default_server;' \
                '    server_name _;' \
                '    client_max_body_size 10M;' \
                '    location /static/ {' \
                '        alias /opt/deployctrl/staticfiles/;' \
                '        expires 30d;' \
                '        add_header Cache-Control "public, immutable";' \
                '    }' \
                '    location / {' \
                '        proxy_pass         http://127.0.0.1:8000;' \
                '        proxy_http_version 1.1;' \
                '        proxy_set_header   Host              $host;' \
                '        proxy_set_header   X-Real-IP         $remote_addr;' \
                '        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;' \
                '        proxy_set_header   X-Forwarded-Proto $scheme;' \
                '        proxy_read_timeout 60s;' \
                '    }' \
                '}' \
                > /etc/nginx/conf.d/deployctrl.conf

              nginx -t
              systemctl enable --now nginx

              # ── 12. Signal CloudFormation: success ───────────────────────
              signal 0

            - DebugValue: !FindInMap [EnvironmentConfig, !Ref Environment, Debug]


# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:

  ApplicationURL:
    Description: Public URL of the DeployCtrl web interface
    Value: !Sub 'http://${AppEIP}'

  PublicIP:
    Description: Elastic IP address (persistent across reboots)
    Value: !Ref AppEIP

  SSHCommand:
    Description: SSH command to connect to the instance
    Value: !Sub 'ssh -i ${KeyPairName}.pem ec2-user@${AppEIP}'

  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance

  AppLogsPath:
    Description: Application log files on the instance
    Value: /var/log/deployctrl/

  InitLogPath:
    Description: Bootstrap log - check here first if the deployment fails
    Value: /var/log/deployctrl-init.log

  AllowedHostsReminder:
    Description: >
      After deployment, update ALLOWED_HOSTS in /opt/deployctrl/.env
      to your Elastic IP or domain, then restart: systemctl restart deployctrl
    Value: !Sub 'Current: ${AllowedHosts} - replace * with ${AppEIP} or your domain'
